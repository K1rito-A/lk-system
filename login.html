<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход - Личный кабинет</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#2c2f33;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:8px;
    width:300px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#2d6cdf;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1f4fbf;
}

.error{
    color:red;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Личный кабинет</h2>
    <input type="text" id="username" placeholder="Логин">
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>
    <div class="error" id="error"></div>
</div>

<script>
function login(){
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === "student" && pass === "123456"){
        window.location.href = "lk.html";
    } else {
        document.getElementById("error").innerText = "Неверный логин или пароль";
    }
}
</script>

</body>
</html>
