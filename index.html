<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f3f3f3;
    color:#333;
}

/* 顶部黑色栏 */
.topbar{
    background:#1f1f1f;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.topbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:14px;
}

/* 主体 */
.container{
    width:75%;
    margin:30px auto;
    background:white;
    padding:25px 30px;
}

/* 面包屑 */
.breadcrumb{
    background:#eee;
    padding:10px 15px;
    font-size:14px;
    margin-bottom:20px;
}

/* 二级导航 */
.tabs{
    margin-bottom:20px;
}

.tabs a{
    text-decoration:none;
    margin-right:15px;
    padding:8px 14px;
    border-radius:4px;
    font-size:14px;
    color:#2c6db2;
}

.tabs a.active{
    background:#2c6db2;
    color:white;
}

/* 表格 */
table{
    width:100%;
    border-collapse:collapse;
}

td, th{
    padding:10px;
    border:1px solid #ddd;
}

th{
    background:#f5f5f5;
    text-align:left;
}

/* 底部 */
.footer{
    text-align:center;
    padding:25px;
    font-size:14px;
    color:#777;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="topbar">
    <div>ЛК</div>
    <div>
        <a href="#">МФК</a>
        <a href="#">Новости</a>
        <a href="#">Личный кабинет</a>
    </div>
</div>

<!-- 内容 -->
<div class="container">

    <div class="breadcrumb">
        Личный кабинет
    </div>

    <div class="tabs">
        <a href="#" class="active">Я</a>
        <a href="#">МФК</a>
        <a href="#">Оценки</a>
        <a href="#">Портфолио</a>
        <a href="#">Приказы</a>
        <a href="#">Обращения</a>
        <a href="#">Опросы</a>
        <a href="#">Настройки</a>
    </div>

    <!-- 这里是内容区 -->
    <h3>Страница "Я"</h3>

</div>

<div class="footer">
    Разработка сайта &nbsp;&nbsp;&nbsp; Дмитрий Фырнин
</div>

</body>
</html>
